name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-suite:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Force HTTPS for GitHub git dependencies
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Main Validation Gate
        run: |
          bun run typecheck
          bun run lint
          bun run check:boundaries
          bun run check:release:readiness
          bun run test
          bun run test:provider
          bun run check:migrations
          bun run test:migration
          bun run test:integration:stable
          bun run test:smoke

  packaging-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Force HTTPS for GitHub git dependencies
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Linux release packaging smoke test
        run: bun run dist

  detect-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
      tag_name: ${{ steps.detect.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect unreleased version on default branch
        id: detect
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CURRENT_REF: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: node scripts/ci/detect-pending-release.mjs

  build-release:
    name: Build release (${{ matrix.os }})
    needs: [full-suite, packaging-smoke, detect-release]
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: release-assets-linux
          - os: windows-latest
            artifact_name: release-assets-windows
          - os: macos-latest
            artifact_name: release-assets-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Force HTTPS for GitHub git dependencies
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: bun run dist

      - name: Upload OS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/**
          if-no-files-found: error

  publish-release:
    needs: [detect-release, build-release]
    if: needs.detect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or verify release tag
        env:
          TAG_NAME: ${{ needs.detect-release.outputs.tag_name }}
        run: bash scripts/ci/prepare-release-tag.sh

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate release checksums
        run: bash scripts/ci/generate-release-checksums.sh release-artifacts

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          draft: false
          generate_release_notes: true
          files: release-artifacts/**/*
          overwrite_files: true
